data:
  raw_path: data/raw/lifestyle_data.csv
  processed_path: data/processed/clean.csv
  features_path: data/processed/features.csv
  n_samples: 5000
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - age
    - bmi
    - activity_level
    - diet_score
    - sleep_hours
  categorical:
    - smoking_status
  engineered:
    - bmi_age_risk_band
    - activity_deficit_score
    - diet_sleep_index
    - lifestyle_risk_score
  pca_components: 3

models:
  random_state: 42
  cv_folds: 5
  logistic_regression:
    max_iter: 1000
    C: 1.0
  svm:
    kernel: rbf
    param_grid:
      C: [0.1, 1, 10]
      gamma: [scale, auto]
  random_forest:
    n_estimators: 200
    max_depth: 10
  naive_bayes: {}

mlflow:
  experiment_name: personafit_health_risk
  tracking_uri: mlruns

paths:
  models_dir: models
  results_dir: results
  shap_dir: results/shap
