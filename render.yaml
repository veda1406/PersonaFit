services:
  - type: web
    name: personafit
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python build.py
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: /opt/render/project/src
